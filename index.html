<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="个人常用网址工具分享 - 学习,文件转换，脚本等实用导航。底部背景图片可随意更换。">
    <title>个人工具箱 · 常用网址导航</title>
    <!-- Font Awesome 6 (外部图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 引入独立样式文件 -->
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="hero">
            <h1><i class="fas fa-toolbox"></i> Soberguo的常用工具导航</h1>
            <p>文件转换 · 英语学习 · 游戏脚本 · 更多效率资源</p>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索网址、描述或标签... (如: 英语, 转换, 游戏)" autocomplete="off">
                <button id="clearSearchBtn" class="clear-search" title="清空搜索">
                    <i class="fas fa-times-circle"></i> <span>清空</span>
                </button>
            </div>
            <div id="searchStats" class="search-stats"></div>
        </div>

        <!-- 实用功能栏：复制本页地址 + 说明 -->
        <div class="info-footer">
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <span><i class="fas fa-share-alt"></i> 分享本页：</span>
                <div class="copy-url" id="pageUrlDisplay">加载中...</div>
                <button id="copyPageBtn" class="btn btn-primary" style="padding:0.3rem 1rem;"><i class="fas fa-copy"></i> 复制链接</button>
            </div>
            <div class="edit-note">
                <i class="fas fa-edit"></i>静态代码地址：https://github.com/GGGZW/GuoshareIndex.git
            </div>
        </div>

        <!-- 网址卡片列表（动态生成） -->
        <div id="linksContainer" class="links-grid"></div>

        <!-- 背景控制栏 -->
        <div class="bg-controller">
            <span><i class="fas fa-image"></i> 🎨 背景随心换：</span>
            <div class="btn-group">
                <input type="text" id="bgUrlInput" class="bg-url-input" placeholder="输入图片URL (https://...)" value="">
                <button id="setBgFromUrl" class="btn btn-primary"><i class="fas fa-check"></i> 应用URL</button>
                <label for="bgUploadInput" class="btn btn-outline file-upload-label" style="cursor: pointer;">
                    <i class="fas fa-cloud-upload-alt"></i> 上传图片
                </label>
                <input type="file" id="bgUploadInput" accept="image/jpeg,image/png,image/webp,image/jpg" style="display: none;">
                <button id="resetBgBtn" class="btn btn-outline"><i class="fas fa-undo-alt"></i> 重置默认</button>
            </div>
        </div>
        <div class="footer-note">
            🌟 公开导航 · 人人可用 · 点击卡片直达工具站点
        </div>
    </div>

    <!-- 引入独立 JavaScript 文件 -->
    <script src="./js/index.js"></script>
</body>
</html>
